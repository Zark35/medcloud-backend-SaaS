# MedCloud — producción local: Nginx → Gunicorn → Django → PostgreSQL
# Uso: docker compose up --build
#
# Punto de entrada público: Nginx en localhost:${WEB_PORT:-8000}
# Gunicorn (web) solo es accesible dentro de la red Docker.

services:
  db:
    image: postgres:16-alpine
    container_name: medcloud-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medcloud}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-medcloud}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - medcloud-network

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medcloud-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      USE_POSTGRESQL: "True"
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      BEHIND_PROXY: "True"
      USE_X_FORWARDED_HOST: "True"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost 127.0.0.1 nginx}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
    expose:
      - "8000"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - medcloud-network

  nginx:
    image: nginx:1.27-alpine
    container_name: medcloud-nginx
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8000}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/api/health/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - medcloud-network

volumes:
  postgres_data:
  media_data:
  static_data:

networks:
  medcloud-network:
    driver: bridge
