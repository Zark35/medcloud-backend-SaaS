# MedCloud — Nginx como reverse proxy y servidor de archivos estáticos/media
#
# Flujo: Cliente → Nginx:80 → Gunicorn (web:8000) → Django → PostgreSQL
# Nginx sirve /static/ y /media/ directamente (más rápido que pasar por Django).

upstream medcloud_gunicorn {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    # Alineado con la validación del serializer (máx. 10 MB)
    client_max_body_size 10M;

    # Archivos recolectados con collectstatic (admin, drf-spectacular, etc.)
    location /static/ {
        alias /var/www/static/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Exámenes médicos subidos por la API (volume compartido con Django)
    location /media/ {
        alias /var/www/media/;
        expires 1d;
        add_header Cache-Control "public";
    }

    # Todo lo demás (API, admin, Swagger) → Gunicorn/Django
    location / {
        proxy_pass http://medcloud_gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
