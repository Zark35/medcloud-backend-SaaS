# Render Blueprint — MedCloud API
# https://render.com/docs/blueprint-spec
#
# En Render el balanceador HTTPS actúa como capa frontal (similar a Nginx).
# Este blueprint despliega Gunicorn + Django; para stack Nginx+Gunicorn en VPS
# usa docker-compose.yml. Ver DEPLOY_RENDER.md.

databases:
  - name: medcloud-db
    databaseName: medcloud
    user: medcloud
    plan: free

services:
  - type: web
    name: medcloud-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: BEHIND_PROXY
        value: "True"
      - key: USE_X_FORWARDED_HOST
        value: "True"
      - key: DJANGO_ALLOW_ALL_ORIGINS
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: medcloud-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: GUNICORN_WORKERS
        value: "2"
      - key: PORT
        value: "8000"
